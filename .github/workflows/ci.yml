name: ci

on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main, master ]

jobs:
  python:
    uses: nikolareljin/ci-helpers/.github/workflows/python.yml@production
    with:
      working_directory: web-app
      lint_command: "python -m pip install -r requirements.txt && python -m pip install ruff && ruff check ."
      test_command: "echo 'No tests yet'"
