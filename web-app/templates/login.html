<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ShelfCast Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="ip-badge">Pi IP: <span>{{ ip_address }}</span></div>
    <main class="login">
      <h1>Login</h1>
      {% if using_default_password %}
        <p class="note">Security warning: default password is active. Change it in Settings after login.</p>
      {% endif %}
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <label>
          Username
          <input type="text" name="username" required />
        </label>
        <label>
          Password
          <input type="password" name="password" required />
        </label>
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
